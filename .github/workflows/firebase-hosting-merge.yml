name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SILLY_LIL_GAME }}'
          channelId: live
          projectId: silly-lil-game
        # The key fix: This prevents the action from trying to run 'npm' commands
        env:
          FIREBASE_CLI_PREDEPLOY: "false"
